version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: dqueq-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: dqueq_bot
    ports:
      - "5436:5432"
    volumes:
      - pgdata_dqueq:/var/lib/postgresql/data

volumes:
  pgdata_dqueq:
