<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/manifest.json" />
  <title>DQueue Remote Android</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080b12;
      color: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 111, 0, 0.14), transparent 30rem),
        #080b12;
    }

    main {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .meta {
      margin: 4px 0 0;
      color: #94a3b8;
      font-size: 12px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #263244;
      border-radius: 999px;
      padding: 7px 11px;
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
    }

    .status.online .dot {
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 540px) minmax(260px, 1fr);
      align-items: start;
      gap: 18px;
    }

    .device-shell,
    .panel {
      border: 1px solid #202a39;
      background: rgba(15, 20, 30, 0.9);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .device-shell {
      position: relative;
      overflow: hidden;
      width: min(100%, 450px);
      margin: 0 auto;
      border-radius: 22px;
      aspect-ratio: 9 / 16;
      touch-action: none;
      user-select: none;
      outline: none;
    }

    .device-shell:focus {
      border-color: #ff7900;
      box-shadow:
        0 0 0 3px rgba(255, 121, 0, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.35);
    }

    #screen {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      background: #030712;
      cursor: crosshair;
      -webkit-user-drag: none;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      color: #94a3b8;
      font-size: 13px;
      background: #030712;
    }

    .panel {
      border-radius: 16px;
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 14px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    button,
    input {
      border: 1px solid #2b3749;
      border-radius: 10px;
      font: inherit;
    }

    button {
      min-height: 42px;
      background: #172033;
      color: #e2e8f0;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      border-color: #ff8a1f;
      background: #202b40;
    }

    button.primary {
      border-color: #ff7900;
      background: #ff7900;
      color: #1b0b00;
    }

    .text-control {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    input {
      min-width: 0;
      flex: 1;
      padding: 0 12px;
      background: #090e18;
      color: #f8fafc;
      outline: none;
    }

    .help,
    #last-action {
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.6;
    }

    .help {
      margin: 14px 0 0;
    }

    #last-action {
      min-height: 20px;
      margin: 12px 0 0;
      color: #fbbf24;
    }

    .keyboard-capture {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 820px) {
      .layout {
        display: block;
      }

      .panel {
        margin-top: 14px;
      }
    }
  </style>
</head>

<body>
  <main>
    <textarea id="keyboard-capture" class="keyboard-capture" aria-hidden="true" autocomplete="off" autocapitalize="off"
      spellcheck="false"></textarea>
    <header>
      <div>
        <h1>DQueue Remote Android</h1>
        <p class="meta">BlueStacks · 127.0.0.1:5555 · 900×1600</p>
      </div>
      <div class="status" id="status"><span class="dot"></span><span id="status-text">Connecting</span></div>
    </header>

    <div class="layout">
      <section class="device-shell" id="device" tabindex="0" aria-label="Android screen control">
        <img id="screen" alt="Android screen" draggable="false" />
        <div class="loading" id="loading">Loading Android screen…</div>
      </section>

      <aside class="panel">
        <h2>Android controls</h2>
        <div class="buttons">
          <button type="button" data-key="KEYCODE_BACK">Back</button>
          <button type="button" data-key="KEYCODE_HOME">Home</button>
          <button type="button" data-key="KEYCODE_APP_SWITCH">Recent apps</button>
          <button type="button" class="primary" id="launch">Open DQueue</button>
        </div>

        <div class="text-control">
          <input id="text" type="text" autocomplete="off" placeholder="พิมพ์ข้อความเข้า Android" />
          <button type="button" id="send-text">Send</button>
        </div>

        <p class="help">
          คลิกช่องในแอป แล้วพิมพ์ภาษาไทย อังกฤษ หรือตัวเลขจากคีย์บอร์ดได้ทันที
          ภาพนี้มาจากแอป DQueue ที่กำลังรันจริงใน BlueStacks
        </p>
        <p id="last-action"></p>
      </aside>
    </div>
  </main>

  <script>
    const DEVICE_WIDTH = 900;
    const DEVICE_HEIGHT = 1600;
    const screen = document.getElementById("screen");
    const device = document.getElementById("device");
    const loading = document.getElementById("loading");
    const keyboardCapture = document.getElementById("keyboard-capture");
    const status = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    const lastAction = document.getElementById("last-action");
    let pointerStart = null;
    let stopped = false;
    let keyQueue = Promise.resolve();

    async function apiInput(payload) {
      const response = await fetch("/api/input", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
    }

    function point(event) {
      const rect = screen.getBoundingClientRect();
      return {
        x: Math.round(((event.clientX - rect.left) / rect.width) * DEVICE_WIDTH),
        y: Math.round(((event.clientY - rect.top) / rect.height) * DEVICE_HEIGHT),
        time: Date.now(),
      };
    }

    async function sendPointerGesture(start, end) {
      const distance = Math.hypot(end.x - start.x, end.y - start.y);
      try {
        if (distance < 18) {
          await apiInput({ type: "tap", x: end.x, y: end.y });
          lastAction.textContent = `Tap ${end.x}, ${end.y}`;
        } else {
          const duration = Math.max(100, Math.min(1200, end.time - start.time));
          await apiInput({
            type: "swipe",
            x1: start.x,
            y1: start.y,
            x2: end.x,
            y2: end.y,
            duration,
          });
          lastAction.textContent = `Swipe ${start.x},${start.y} → ${end.x},${end.y}`;
        }
      } catch (error) {
        lastAction.textContent = error.message;
      }
    }

    device.addEventListener("pointerdown", (event) => {
      device.focus();
      pointerStart = point(event);
      device.setPointerCapture(event.pointerId);
    });

    device.addEventListener("pointerup", (event) => {
      if (!pointerStart) return;
      const start = pointerStart;
      pointerStart = null;
      sendPointerGesture(start, point(event));
      keyboardCapture.focus({ preventScroll: true });
    });

    device.addEventListener("pointercancel", () => {
      pointerStart = null;
    });

    keyboardCapture.addEventListener("input", () => {
      const text = keyboardCapture.value;
      keyboardCapture.value = "";
      if (!text) return;

      keyQueue = keyQueue
        .then(() => apiInput({ type: "text", text }))
        .then(() => {
          lastAction.textContent = `Typed ${text}`;
        })
        .catch((error) => {
          lastAction.textContent = error.message;
        });
    });

    keyboardCapture.addEventListener("keydown", (event) => {
      let payload = null;

      if (event.key === "Backspace") {
        payload = { type: "key", key: "KEYCODE_DEL" };
      } else if (event.key === "Enter") {
        payload = { type: "key", key: "KEYCODE_ENTER" };
      } else if (event.key === "Escape") {
        payload = { type: "key", key: "KEYCODE_BACK" };
      }

      if (!payload) return;
      event.preventDefault();
      keyQueue = keyQueue
        .then(() => apiInput(payload))
        .then(() => {
          lastAction.textContent = event.key;
        })
        .catch((error) => {
          lastAction.textContent = error.message;
        });
    });

    async function refreshFrame() {
      if (stopped) return;
      const next = new Image();
      next.onload = () => {
        screen.src = next.src;
        loading.style.display = "none";
        window.setTimeout(refreshFrame, 180);
      };
      next.onerror = () => {
        loading.style.display = "grid";
        loading.textContent = "Waiting for Android frame…";
        window.setTimeout(refreshFrame, 1000);
      };
      next.src = `/api/frame?t=${Date.now()}`;
    }

    async function checkStatus() {
      try {
        const response = await fetch("/api/status", { cache: "no-store" });
        const data = await response.json();
        status.classList.toggle("online", Boolean(data.ok));
        statusText.textContent = data.ok ? "Device online" : data.state || "Offline";
      } catch {
        status.classList.remove("online");
        statusText.textContent = "Server offline";
      }
    }

    document.querySelectorAll("[data-key]").forEach((button) => {
      button.addEventListener("click", async () => {
        try {
          await apiInput({ type: "key", key: button.dataset.key });
          lastAction.textContent = button.textContent;
        } catch (error) {
          lastAction.textContent = error.message;
        }
      });
    });

    document.getElementById("launch").addEventListener("click", async () => {
      try {
        await apiInput({ type: "launch" });
        lastAction.textContent = "Opening DQueue";
      } catch (error) {
        lastAction.textContent = error.message;
      }
    });

    document.getElementById("send-text").addEventListener("click", async () => {
      const input = document.getElementById("text");
      if (!input.value) return;
      try {
        await apiInput({ type: "text", text: input.value });
        lastAction.textContent = "Text sent";
        input.value = "";
      } catch (error) {
        lastAction.textContent = error.message;
      }
    });

    window.addEventListener("beforeunload", () => {
      stopped = true;
    });

    checkStatus();
    window.setInterval(checkStatus, 3000);
    refreshFrame();
  </script>
</body>

</html>
